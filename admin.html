<!DOCTYPE html>
<html>
<head>
    <title>Power Tech AI - Admin</title>
    <style>
        body { font-family: 'Segoe UI', sans-serif; background: #f0f2f5; display: flex; justify-content: center; padding-top: 50px; }
        .card { background: white; width: 450px; padding: 40px; border-radius: 15px; box-shadow: 0 10px 25px rgba(0,0,0,0.1); text-align: center; }
        h2 { color: #003366; margin-bottom: 10px; }
        p { color: #666; font-size: 14px; margin-bottom: 30px; }
        .upload-area { border: 2px dashed #cbd5e0; padding: 30px; border-radius: 10px; cursor: pointer; transition: 0.2s; background: #fafafa; }
        .upload-area:hover { background: #eef6fc; border-color: #003366; }
        button { background: #003366; color: white; border: none; padding: 12px 30px; border-radius: 8px; font-size: 16px; font-weight: 600; margin-top: 20px; cursor: pointer; width: 100%; }
        button:disabled { background: #ccc; cursor: not-allowed; }
        #status { margin-top: 20px; padding: 10px; border-radius: 5px; font-size: 14px; display: none; }
        .success { background: #d4edda; color: #155724; }
        .error { background: #f8d7da; color: #721c24; }
    </style>
</head>
<body>
    <div class="card">
        <h2>📂 Knowledge Base</h2>
        <p>Upload Tariff Orders & Regulations (PDF) to train the AI.</p>
        
        <input type="file" id="pdfInput" accept=".pdf" style="display: none;" onchange="showFileName()">
        <div class="upload-area" onclick="document.getElementById('pdfInput').click()">
            <span id="fileLabel">📄 Click to Select PDF</span>
        </div>

        <button id="uploadBtn" onclick="trainAI()">Upload & Train</button>
        <div id="status"></div>
    </div>

    <script>
        function showFileName() {
            const file = document.getElementById('pdfInput').files[0];
            if(file) document.getElementById('fileLabel').innerText = "✅ " + file.name;
        }

        async function trainAI() {
            const file = document.getElementById('pdfInput').files[0];
            if (!file) return alert("Please select a file first.");
            
            const btn = document.getElementById('uploadBtn');
            const status = document.getElementById('status');
            
            btn.disabled = true;
            btn.innerText = "Processing... (Reading & Indexing)";
            status.style.display = 'none';

            const formData = new FormData();
            formData.append("file", file);

            try {
                const res = await fetch('/upload', { method: 'POST', body: formData });
                const data = await res.json();
                
                status.style.display = 'block';
                if(data.status === 'success') {
                    status.className = 'success';
                    status.innerText = data.message;
                } else {
                    status.className = 'error';
                    status.innerText = data.message;
                }
            } catch (e) {
                status.style.display = 'block';
                status.className = 'error';
                status.innerText = "Error: Server not reachable.";
            }
            btn.disabled = false;
            btn.innerText = "Upload & Train";
        }
    </script>
</body>
</html>
